<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agrinho 2026 - Fazenda Inteligente</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Montserrat', sans-serif;
}

body {
    background: linear-gradient(120deg, #0f5132, #198754, #20c997);
    min-height: 100vh;
    color: white;
    overflow-x: hidden;
}

/* HEADER */
header {
    text-align: center;
    padding: 30px;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(10px);
}

header h1 {
    font-size: 2.5rem;
    letter-spacing: 2px;
}

header p {
    opacity: 0.8;
}

/* DASHBOARD */
.dashboard {
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
    margin: 20px;
}

.card {
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    padding: 20px;
    width: 200px;
    margin: 10px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.2);
}

.card h2 {
    font-size: 1.2rem;
}

.value {
    font-size: 2rem;
    margin-top: 10px;
}

/* GAME AREA */
.game {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 30px;
}

.farm {
    width: 90%;
    max-width: 900px;
    height: 300px;
    background: url('https://images.unsplash.com/photo-1500595046743-cd271d694d30?auto=format&fit=crop&w=1200&q=80');
    background-size: cover;
    border-radius: 20px;
    position: relative;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

/* PLANTS */
.plant {
    position: absolute;
    width: 40px;
    height: 40px;
    background: url('https://cdn-icons-png.flaticon.com/512/415/415733.png');
    background-size: cover;
    animation: grow 1s ease-out;
}

@keyframes grow {
    from { transform: scale(0); }
    to { transform: scale(1); }
}

/* CONTROLS */
.controls {
    margin-top: 20px;
}

button {
    padding: 12px 20px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    background: #ffc107;
    color: black;
    transition: 0.3s;
}

button:hover {
    background: #ffcd39;
    transform: scale(1.05);
}

/* FOOTER */
footer {
    text-align: center;
    margin-top: 40px;
    padding: 20px;
    opacity: 0.7;
}
</style>
</head>

<body>

<header>
    <h1>🌱 Agrinho 2026 - Fazenda Inteligente</h1>
    <p>Gerencie sua fazenda com tecnologia, sustentabilidade e estratégia</p>
</header>

<div class="dashboard">
    <div class="card">
        <h2>💰 Lucro</h2>
        <div class="value" id="money">100</div>
    </div>

    <div class="card">
        <h2>💧 Água</h2>
        <div class="value" id="water">100</div>
    </div>

    <div class="card">
        <h2>🌱 Solo</h2>
        <div class="value" id="soil">100</div>
    </div>

    <div class="card">
        <h2>🌾 Produção</h2>
        <div class="value" id="prod">0</div>
    </div>
</div>

<div class="game">
    <div class="farm" id="farm"></div>

    <div class="controls">
        <button onclick="plantCrop()">🌱 Plantar</button>
        <button onclick="irrigate()">💧 Irrigar</button>
        <button onclick="technology()">🤖 Tecnologia</button>
        <button onclick="harvest()">🌾 Colher</button>
    </div>
</div>

<footer>
    Projeto educacional inspirado no tema Agrinho 2026 — Agricultura inteligente e sustentável
</footer>

<script>
let money = 100;
let water = 100;
let soil = 100;
let prod = 0;

const farm = document.getElementById("farm");

function update() {
    document.getElementById("money").innerText = money;
    document.getElementById("water").innerText = water;
    document.getElementById("soil").innerText = soil;
    document.getElementById("prod").innerText = prod;
}

function plantCrop() {
    if (water > 10 && soil > 10) {
        let plant = document.createElement("div");
        plant.classList.add("plant");
        plant.style.left = Math.random() * 90 + "%";
        plant.style.top = Math.random() * 80 + "%";
        farm.appendChild(plant);

        soil -= 5;
        water -= 5;
        prod += 2;
        money += 5;
    } else {
        alert("Recursos insuficientes! Cuide do solo e da água 🌍");
    }
    update();
}

function irrigate() {
    water += 20;
    money -= 5;
    update();
}

function technology() {
    soil += 10;
    water -= 5;
    money -= 10;
    update();
}

function harvest() {
    let plants = document.querySelectorAll(".plant");
    if (plants.length > 0) {
        plants.forEach(p => p.remove());
        money += plants.length * 10;
        prod += plants.length;
    } else {
        alert("Nada para colher!");
    }
    update();
}

update();
</script>

</body>
</html>
